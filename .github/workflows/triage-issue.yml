# Auto-triage GitHub Action.
#
# When a new issue is opened with the "incident" label (or any issue
# matching the body pattern below), this workflow:
#   1. checks out the repo,
#   2. installs deps,
#   3. runs the lightweight pipeline (preprocess + train + index) IF
#      models are not already cached, otherwise reuses the cached models,
#   4. runs the triage CLI on the issue body,
#   5. posts the IT summary as a comment on the issue,
#   6. applies a label that reflects the predicted assignment group.
#
# This demonstrates that the same engine that powers the Flask demo can
# be deployed as a GitHub-native agent — no servers, no cron, just a
# workflow file. Safe by design: the workflow only writes to issues and
# never touches anything destructive.

name: Auto-triage incident issues

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage manually"
        required: true

permissions:
  contents: read
  issues: write

jobs:
  triage:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'incident') ||
      contains(github.event.issue.body, '[auto-triage]')
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Cache trained models so we only retrain when source data changes.
      # Cache key includes a hash of the raw data files so model staleness
      # is detected automatically.
      - name: Cache trained models
        id: model-cache
        uses: actions/cache@v4
        with:
          path: |
            models/
            data/processed/
            data/splits/
          key: triage-models-${{ hashFiles('data/raw/*.xlsx', 'src/**/*.py', 'config.yaml') }}

      - name: Build models if not cached
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          if [ -f "data/raw/incident_dump.xlsx" ]; then
            python -m src.pipeline preprocess
            python -m src.pipeline train
            python -m src.pipeline index
          else
            echo "::warning::No raw data in data/raw/ — using a stub triage response"
            mkdir -p models
            echo "no_data" > models/.no_data
          fi

      - name: Triage the issue
        id: triage
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python scripts/triage_issue_body.py \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --output /tmp/triage_output.json

          # Capture single-line outputs for the next step.
          {
            echo "ag<<EOF"
            python -c "import json; d=json.load(open('/tmp/triage_output.json')); print(d['predicted_group'])"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "comment<<COMMENT_EOF"
            cat /tmp/triage_output.json | python -c "import json,sys; print(json.load(sys.stdin)['comment_markdown'])"
            echo "COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post triage comment
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          TRIAGE_COMMENT: ${{ steps.triage.outputs.comment }}
        with:
          script: |
            const issue_number = parseInt(process.env.ISSUE_NUMBER, 10);
            const body = process.env.TRIAGE_COMMENT;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

      - name: Apply predicted-group label
        if: steps.triage.outputs.ag != ''
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          AG_LABEL: ${{ steps.triage.outputs.ag }}
        with:
          script: |
            const issue_number = parseInt(process.env.ISSUE_NUMBER, 10);
            // Sanitize predicted group name into a valid GitHub label.
            const raw = (process.env.AG_LABEL || '').trim();
            if (!raw) return;
            const label = `triage:${raw}`.slice(0, 50);

            // Ensure the label exists (creates one with a deterministic colour).
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: label
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: label, color: '1f6feb',
                description: 'Auto-applied by the triage workflow'
              });
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number, labels: [label]
            });
